<style>

    /* ================= RESET ================= */
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        list-style-type:none;
        text-decoration:none;
    }
    
    /* ================= HEADER ================= */
    .header{
        display:flex;
        justify-content:space-between;
        align-items:center;
        background:white;
        padding:15px 20px;
        border-bottom:1px solid black;
        flex-wrap:wrap;   /* allows mobile stacking */
    }
    
    /* LOGO */
    .logo h1{
        color:rgba(245,12,12,0.76);
    }
    
    /* NAVIGATION */
    .nav ul{
        display:flex;
        gap:10px;
    }
    
    /* NAV ITEMS */
    .nav li{
        padding:10px 15px;
        font-weight:bold;
        font-size:18px;
        background:rgba(245,12,12,0.76);
        border-radius:10px;
    }
    
    /* LINKS */
    .nav a{
        color:black;
    }
    
    /* CORRECT HOVER */
    .nav li:hover{
        background:rgb(220,10,10);
    }
    
    /* ================= MOBILE VIEW ================= */
    @media (max-width:768px){
    
        .header{
            flex-direction:column;
            gap:15px;
            text-align:center;
        }
    
        .nav ul{
            flex-direction:column;
            width:100%;
        }
    
        .nav li{
            width:100%;
        }
    }
    
    </style>
    
    <header class="header">
    
        <div class="logo">
            <h1>Blog</h1>
        </div>
    
        <nav class="nav">
            <ul>
                <li><a href="{% url 'HomePageurl' %}">Home</a></li>
            </ul>
        </nav>
    
    </header>
