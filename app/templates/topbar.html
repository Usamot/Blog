<style>

    /* ===== RESET ===== */
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        list-style:none;
        text-decoration:none;
    }
    
    /* ===== HEADER ===== */
    .header{
        position:fixed;
        top:0;
        left:0;
        width:100%;
        background:white;
        border-bottom:1px solid black;
    
        display:flex;
        justify-content:space-between;
        align-items:center;
    
        padding:15px 20px;
        z-index:1000;
        flex-wrap:wrap;
    }
    
    /* LOGO */
    .logo h1{
        color:rgba(245,12,12,0.76);
    }
    
    /* NAV LIST */
    .nav ul{
        display:flex;
        gap:10px;
    }
    
    /* NAV ITEM */
    .nav li{
        padding:10px 15px;
        font-weight:bold;
        font-size:18px;
        background:rgba(245,12,12,0.76);
        border-radius:10px;
    }
    
    /* LINKS */
    .nav a{
        color:black;
    }
    
    /* ✅ CORRECT HOVER */
    .nav li:hover{
        background:rgb(220,10,10);
    }
    
    /* ===== MOBILE ===== */
    @media (max-width:768px){
    
        .header{
            flex-direction:column;
            gap:10px;
            text-align:center;
        }
    
        .nav ul{
            flex-direction:column;
            width:100%;
        }
    
        .nav li{
            width:100%;
        }
    }
    
    </style>
    
    <header class="header">
    
        <div class="logo">
            <h1>Blog</h1>
        </div>
    
        <nav class="nav">
            <ul>
    
                {% if user.is_authenticated %}
                    <li><a href="{% url 'HomePageurl' %}">Home</a></li>
                    <li><a href="{% url 'AddPageurl' %}">Add New</a></li>
                    <li><a href="{% url 'LogOutUrl' %}">Log out</a></li>
                {% else %}
                    <li><a href="{% url 'LoginPageUrl' %}">Login</a></li>
                    <li><a href="{% url 'RegisterPageUrl' %}">Register</a></li>
                {% endif %}
    
            </ul>
        </nav>
    
    </header>
