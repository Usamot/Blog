<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    
    <!-- REQUIRED FOR MOBILE RESPONSIVENESS -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Blogs</title>

    <style>
        /* ================= RESET ================= */
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            list-style-type: none;
        }

        body{
            font-family: Arial, sans-serif;
        }

        /* ================= BLOG WRAPPER ================= */
        .blogs_cover{
            padding: 15px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        /* ================= BLOG CARD ================= */
        .blogs_container{
            border: solid 1px gray;
            box-shadow: 5px 5px rgba(128,128,128,0.4);
            width: 100%;   /* MOBILE DEFAULT */
            background: white;
        }

        .blogs_container img{
            width: 100%;
            height: auto;
            display: block;
        }

        .container_cont{
            padding: 10px;
        }

        .container_cont p{
            margin-bottom: 10px;
        }

        .view-btn{
            display: inline-block;
            border: solid 1px grey;
            padding: 8px 12px;
            text-decoration: none;
            color: black;
            margin-top: 10px;
        }

        /* ================= TABLET ================= */
        @media (min-width: 768px){
            .blogs_container{
                width: 48%;   /* 2 cards per row */
            }
        }

        /* ================= LAPTOP ================= */
        @media (min-width: 1024px){
            .blogs_cover{
                padding: 50px;
            }

            .blogs_container{
                width: 30%;   /* 3 cards per row */
            }
        }

    </style>
</head>

<body>

    {% include './topbar.html' %}

    <main class="main" style="margin-top:10vh;">

        <div class="blogs_cover">

            {% for eachBlog in allblog %}
            <div class="blogs_container">

                <img src="{{ eachBlog.img }}" alt="blog image">

                <div class="container_cont">

                    <p style="font-size:12px; font-weight:bold;">
                        {{ eachBlog.title }}
                    </p>

                    <p>
                        {{ eachBlog.content }}
                    </p>

                    <hr>

                    <p>{{ eachBlog.author }}</p>

                    <a href="{% url 'ViewMorePageurl' eachBlog.id %}" class="view-btn">
                        View More
                    </a>

                </div>

            </div>
            {% endfor %}

        </div>

    </main>

</body>
</html>
