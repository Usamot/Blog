<html lang="en">
<head>

        .blogs_cover{
            /* background-color: black; */

            justify-content: space-between;

            /*

             */

            }

<body style="position: relative;">
    {% include './topbar.html' %}

    <main class="main main_margin" style="margin-top: 10vh;" >
        <div class="blogs_cover">
            {% for eachBlog in allblog %}
            <div class="blogs_container"  >
                <!-- <p>{{eachBlog.img}}</p> -->

                <img width="100%" src="{{ eachBlog.img }}" alt="" srcset="">
                <div class="container_cont" >
                    <p style="font-size: 12px; font-weight: bold;" >{{ eachBlog.title }}</p>

                    <p style=" margin: 10px 0; "> {{ eachBlog.content }}</p>
                        <hr/>
                        <br>
                        <div>
                            <p>{{eachBlog.author}}</p>
                            <a href="{% url 'ViewMorePageurl'  eachBlog.id %}"   style="border: solid 1px grey; padding:auto; display: flex;" >View More</a>


                        </div>
                        
                </div>
            </div>
            {% endfor %}

           

        </div>

    </main>
